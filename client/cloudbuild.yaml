steps:
  # Build + push using Kaniko (handles Artifact Registry auth natively in Cloud Build)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/atem-controller:latest'
      - '--cache=true'
      - '--cache-ttl=24h'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'atem-controller'
      - '--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/atem-controller:latest'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: LEGACY

timeout: '1200s'
