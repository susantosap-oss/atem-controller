name: Build Windows .exe

on:
  push:
    tags:
      - 'v*'           # Trigger saat push tag: git tag v1.0.0 && git push --tags
  workflow_dispatch:   # Bisa trigger manual dari GitHub UI

jobs:
  build-windows:
    name: Build .exe Installer
    runs-on: windows-latest

    defaults:
      run:
        working-directory: server

    steps:
      # ── Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Setup Node ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # ── Generate placeholder icon (jika tidak ada) ────────
      - name: Check / generate icon
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/icon.ico")) {
            Write-Host "icon.ico not found — generating placeholder via Node.js"
            New-Item -ItemType Directory -Force -Path assets | Out-Null
            node -e @"
          const fs = require('fs');
          // Minimal valid 1x1 ICO (52 bytes) as placeholder
          // Replace assets/icon.ico with a real 256x256 icon before distribution
          const ico = Buffer.from(
            '0000010001001010000001002000680300001600000028000000100000002000' +
            '0000010020000000000000030000000000000000000000000000000000000000' +
            '000000000f1726ff0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff' +
            '0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff0f1726ff' +
            '0f1726ff0f1726ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff' +
            '3b82f6ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff3b82f6ff0f1726ff' +
            '0f1726ff0f1726ff3b82f6ffffffffffffffffffffffffffffffffffffffffff' +
            'ffffffffffffffffffffffffffffffffffffff3b82f6ff0f1726ff0f1726ff' +
            '3b82f6ff0f1726ff', 'hex'
          );
          fs.writeFileSync('assets/icon.ico', ico);
          fs.writeFileSync('assets/icon.png', ico);
          console.log('Placeholder icon created.');
          "@
          } else {
            Write-Host "icon.ico found, using existing."
          }

      # ── Install dependencies ──────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build .exe ────────────────────────────────────────
      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifact ───────────────────────────────────
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATEM-Controller-Windows-Installer
          path: server/dist/*.exe
          retention-days: 30

      # ── Create GitHub Release (saat push tag) ────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: server/dist/*.exe
          name: ATEM Controller ${{ github.ref_name }}
          body: |
            ## ATEM Controller ${{ github.ref_name }}

            ### Instalasi
            1. Download file `.exe` di bawah
            2. Jalankan installer (akan otomatis buka port 3000 dan 4000 di Windows Firewall)
            3. Pastikan HP terhubung ke WiFi yang sama dengan PC
            4. Buka `https://atem-pwa-177351947478.asia-southeast1.run.app` di browser HP
            5. Masukkan IP PC di Server URL (mis. `http://192.168.1.100:4000`)

            ### Perubahan
            - Lihat commit history untuk detail
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
